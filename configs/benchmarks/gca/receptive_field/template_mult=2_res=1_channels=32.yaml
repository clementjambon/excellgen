###########
# Dataset #
###########
dataset: fine_stage_dataset
eval_datasets: [
    [fine_stage_dataset, val],
]
test_datasets: [
  [fine_stage_dataset, test],
]
data_root: ""
data_dim: 3
data_axis: "y"
data_res: 64

plot_activations: True

mean_vox_points: 3000
max_steps: 10000

epoch: 1000000
num_workers: 6

######################
# Fine-stage dataset #
######################

# NEW PARAMETERS
context_res: !!python/tuple [25,30]

context_padding: 2
# init_prop: 0.1
min_context_fine_voxels: 250
latent_mode: "lf_voxels"
res_idx: 1 # 64
res_idx_coarse: 3 # 16
conditioning_mode: "s0"


#########
# Model #
#########
model: fine_stage_transition
padding: 2
pad_type: hypercross
z_dim: 8 # rgb
c_dim: 1 # onehot (trunks, leaves, fruits, cable)
n_classes: 5
backbone:
  name: ResUNetv2Base

  model_channels: 32
  
  channel_mult: [1, 2]
  num_res_blocks: 1
  dropout: 0.1
  norm_type: "batch"

gca_loss:
  name: ElboKlWithLatentLoss
  embedding_loss_weight: 0.01

phase_profile:
  name: ConstantPhaseProfile
  max_phase: 5
  test_max_phase: 10
  equilibrium_max_phase: 5
  test_mode_seeking_steps: 1

sampling_scheme: bernoulli

input_occ: True
cond_dropout_p: 0.5
min_variance: 1e-4

#########
# Train #
#########
infusion_scheduler:
  name: LinearInfusionScheduler
  start: 0.1
  rate: 0.15
  max_phase: 5

sigma_scheduler:
  type: exponential
  initial_rate: -1.
  speed: -0.01

batch_size: 32

optimizer:
  type: AdamW
  options:
    lr: .00005
    weight_decay: 1.0e-6

clip_grad:
  type: norm
  options:
    max_norm: 0.5

lr_scheduler:
  type: StepLR
  options:
    step_size: 25000
    gamma: 0.5

completion_rate: 0.95

buffer_profile:
  name: ConstantBufferProfile
  size: 1024

###########
# Summary #
###########
summary_step: 100000
ckpt_step: 10000

#################
# Visualization #
#################
vis_batch_size: 1
min_vis_step: 10
vis:
  indices: 1
  vis_collated_imgs:
      step: 5000
      vis_2d:
        height: 32
        width: 32


#########
# Utils #
#########
device: cuda
seed: 0
empty_cache_step: 20

#########
# Debug #
#########
# every step is visualized
debug_vis: False
# every step is evaluated
debug_eval: False
# fit only specified data point
# if not used, leave as blank (None)
overfit_one_ex:

############
# Evaluate #
############
eval_step: 2000
min_eval_step: 100000000000
eval_size: 128
eval_batch_size: 1
max_eval_phase: 5

########
# Test #
########
test_step: 5000
test_batch_size: 8
test_uni_n_ref_samples: 100
# Multi
test_multi_n_trials: 10
test_multi_n_ref_samples: 16
min_test_step: 100000000000
# MMD
test_mmd_n_trials: 50

